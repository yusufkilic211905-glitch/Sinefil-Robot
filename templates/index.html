<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinefil Bir Robot 🤖</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; color: white; 
            /* ARKA PLAN AYARI: Klasöründeki resme bakar */
            background: linear-gradient(rgba(0, 0, 0, 0.82), rgba(0, 0, 0, 0.82)), 
                        url('/static/arkaplan.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
        }

        @media only screen and (max-width: 600px) {
            body { background-attachment: scroll; padding: 15px 10px; }
            .container { width: 100% !important; margin: 0; padding: 20px; border-radius: 10px; }
            .imdb-score { font-size: 50px !important; }
        }

        .container { 
            background: rgba(17, 17, 17, 0.94);
            padding: 35px; border-radius: 20px; 
            width: 450px; border: 1px solid #333; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7); 
            margin: 20px;
        }

        h2 { text-align: center; color: #e50914; margin-bottom: 25px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #bbb; font-size: 11px; text-transform: uppercase; font-weight: bold; }
        
        input, select { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; 
            background: rgba(26, 26, 26, 0.8); color: white; box-sizing: border-box; font-size: 16px; 
        }
        
        input:focus { border-color: #e50914; outline: none; background: rgba(34, 34, 34, 0.9); }
        
        button { 
            width: 100%; padding: 15px; background: #e50914; border: none; border-radius: 8px; 
            color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; transition: 0.3s;
        }
        button:hover { background: #ff0a16; transform: scale(1.02); }

        /* SONUÇ KARTI AYARLARI */
        .res-card { 
            margin-top: 25px; padding: 20px; 
            background: rgba(30, 30, 30, 0.9); 
            border-radius: 12px; border-left: 5px solid #e50914;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .opinion-title { color: #e50914; font-weight: bold; font-size: 16px; margin-bottom: 12px; border-bottom: 1px solid #444; padding-bottom: 8px; }
        
        .imdb-score-wrapper { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .imdb-score { font-size: 65px; font-weight: bold; color: #e50914; line-height: 1; }
        .record-icon { font-size: 40px; filter: drop-shadow(0 0 5px #e50914); }

        .stat-line { margin: 10px 0; font-size: 15px; }
        .highlight { color: #ffd700; font-weight: bold; }

        .footer-warning { 
            font-size: 11px; color: #555; margin-top: 35px; 
            text-align: center; border-top: 1px solid #222; padding-top: 15px; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Sinefil Bir Robot 🤖</h2>
        
        <form action="/predict" method="post" autocomplete="off">
            <div class="form-group"><label>Film Bütçesi ($)</label><input type="number" name="budget" required></div>
            <div class="form-group"><label>Süre (Dakika)</label><input type="number" name="runtime" required></div>
            <div class="group-flex" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group"><label>Orijinal Dil</label><input type="text" name="language" placeholder="en, tr.."></div>
                <div class="form-group"><label>Popülerlik</label><input type="number" name="popularity" placeholder="0-1000"></div>
            </div>
            <div class="form-group"><label>Yapım Şirketi</label><input type="text" name="company" placeholder="Warner Bros, Marvel.."></div>
            <div class="form-group"><label>Yönetmen</label><input type="text" name="director"></div>
            <div class="form-group">
                <label>Başroller</label>
                <input type="text" name="actor1" placeholder="1. Başrol" style="margin-bottom:8px;">
                <input type="text" name="actor2" placeholder="2. Başrol">
            </div>
            <div class="form-group">
                <label>Film Türü</label>
                <select name="genre">
                    {% for g in genres %}
                    <option value="{{ g }}">{{ g }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit">ANALİZİ BAŞLAT</button>
        </form>

        {% if prediction_text %}
        <div class="res-card">
            <div class="opinion-title">📊 ALGORİTMANIN GÖRÜŞLERİ</div>
            
            <div class="imdb-score-wrapper">
                <div>
                    <div style="font-size: 12px; color: #aaa; text-align: center;">TAHMİNİ SKOR</div>
                    <span class="imdb-score">{{ prediction_text }}</span>
                </div>
                <div class="record-icon">📜</div> <!-- Kayıt simgesi -->
            </div>

            <div class="stat-line">Gişe Beklentisi: <span class="highlight">$ {{ revenue_text }}</span></div>
            <div class="stat-line" style="margin-top:15px; border-top:1px solid #444; padding-top:10px;">
                <span style="color: #00ff00; font-weight: bold;">● Başarı Analizi:</span><br>
                {{ algo_opinion }}
            </div>
        </div>
        {% endif %}

        <div class="footer-warning">
            UYARIı: Bu bir yapay zeka algoritmasıdır, yatırım tavsıyesi değildir!!
        </div>
    </div>
</body>
</html>
